<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>자동 뽑기판</title>
    <style>
        body { background: transparent; text-align: center; font-family: sans-serif; }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 500px; margin: 0 auto; }
        .slot { width: 45px; height: 45px; border: 1px solid #ccc; background: #eee; display: flex; align-items: center; justify-content: center; }
        .picked { background: #ff4757; color: white; border-color: #ff6b81; }
        #result { font-size: 2rem; margin: 20px; color: #2f3542; font-weight: bold; }
        button { padding: 10px 20px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div id="result">행운의 번호는?</div>
    <div id="board"></div>
    <br>
    <button onclick="draw()">번호 뽑기</button>
    <button onclick="resetBoard()">초기화</button>

    <script>
        const total = 100; // 전체 칸 수
        let numbers = Array.from({length: total}, (_, i) => i + 1);
        let pickedNumbers = JSON.parse(localStorage.getItem('picked')) || [];

        function render() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let i = 1; i <= total; i++) {
                const div = document.createElement('div');
                div.className = 'slot' + (pickedNumbers.includes(i) ? ' picked' : '');
                div.innerText = i;
                board.appendChild(div);
            }
        }

        function draw() {
            const remaining = numbers.filter(n => !pickedNumbers.includes(n));
            if (remaining.length === 0) return alert('모든 칸을 다 뽑았습니다!');
            
            const win = remaining[Math.floor(Math.random() * remaining.length)];
            pickedNumbers.push(win);
            localStorage.setItem('picked', JSON.stringify(pickedNumbers));
            document.getElementById('result').innerText = `당첨 번호: ${win}번!`;
            render();
        }

        function resetBoard() {
            if(confirm('정말 초기화하시겠습니까?')) {
                pickedNumbers = [];
                localStorage.removeItem('picked');
                render();
            }
        }
        render();
    </script>
</body>
</html>
